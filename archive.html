<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive - The Varsity Show</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/archive.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="archive-body">
  <header class="site-header is-visible" id="siteHeader" data-logo="1">
    <div class="header-inner">
      <div class="header-logo">
        <a href="index.html" class="logo-link logo-link--1">
          <img src="assets/logo-1.png" alt="The Varsity Show" class="logo-img">
        </a>
        <a href="index.html" class="logo-link logo-link--2">
          <img src="assets/logo-2.png" alt="The Varsity Show" class="logo-img">
        </a>
        <a href="index.html" class="logo-link logo-link--3">
          <img src="assets/logo-3.png" alt="The Varsity Show" class="logo-img">
        </a>
      </div>

      <nav class="header-nav">
        <a href="archive.html" class="nav-link">past</a>
        <a href="v132/index.html" class="nav-link">present</a>
        <a href="https://securepay.cuit.columbia.edu/payment/pub/v132/" class="nav-link">future</a>
      </nav>

      <div class="header-social">
        <a href="https://www.facebook.com/VarsityShow/" class="social-link" aria-label="Facebook" target="_blank" rel="noopener noreferrer">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg>
        </a>
        <a href="https://www.tiktok.com/@thevarsityshow" class="social-link" aria-label="TikTok" target="_blank" rel="noopener noreferrer">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M13.75 2h2.65a4.7 4.7 0 003.85 3.82v2.68a7.5 7.5 0 01-3.85-1.08v6.35a5.77 5.77 0 11-5.77-5.77c.37 0 .74.04 1.1.11v2.86a2.9 2.9 0 10 1.92 2.73V2z"/></svg>
        </a>
        <a href="https://www.instagram.com/thevarsityshow" class="social-link" aria-label="Instagram" target="_blank" rel="noopener noreferrer">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
        </a>
      </div>
    </div>
  </header>

  <main class="archive-main">
    <div class="archive-banner archive-banner--vertical" aria-hidden="true">
      <div class="archive-banner-bar">
        <span class="archive-banner-text">ARCHIVE</span>
        <img src="assets/bubble.png" alt="" class="archive-banner-bubble">
      </div>
    </div>
    <!-- Horizontal option (keep commented for now) -->
    <!--
    <div class="archive-banner" aria-hidden="true">
      <span class="archive-banner-text">ARCHIVE</span>
      <div class="archive-banner-bar">
        <img src="assets/bubble.png" alt="" class="archive-banner-bubble">
      </div>
    </div>
    -->
    <section class="archive-screen">
      <div class="archive-grid">
        <article class="archive-card archive-card--synopsis">
          <h2 class="archive-card-title">Synopsis</h2>
          <div class="scroll-fade-wrap" data-scroll-target="archiveSynopsis">
            <p id="archiveSynopsis" class="archive-copy"></p>
          </div>
        </article>

        <article class="archive-card archive-card--poster">
          <!-- <a id="archivePosterLink" class="archive-poster-link" href="v131/index.html" aria-label="Open archive show detail page"> -->
            <img id="archivePoster" class="archive-poster" src="assets/v131-cover.jpg" alt="Varsity Show poster">
          </a>
          <h1 id="archiveShowLabel" class="archive-show-label">V131 (2025)</h1>
        </article>

        <article class="archive-card archive-card--media">
          <h2 class="archive-card-title">Media</h2>
          <div id="archiveMediaContainer" class="embed-slot">
            <div class="placeholder-box">media embed placeholder</div>
          </div>

          <h2 id="archiveQuotesHeading" class="archive-card-title archive-card-title--quotes">Quotes</h2>
          <div class="scroll-fade-wrap" data-scroll-target="archiveQuotes">
            <ul id="archiveQuotes" class="quotes-list"></ul>
          </div>

          <a id="archiveSeeMore" class="archive-btn" href="v131/index.html">see more</a>
        </article>
      </div>

      <section class="dial-wrap" aria-label="Archive timeline">
        <div class="timeline-shell">
          <div class="timeline-track" id="timelineTrack" aria-hidden="true">
            <div id="timelineDragSurface" class="timeline-drag-surface" aria-label="Archive year scrubber"></div>
          </div>
        </div>

        <div class="dial-header">
          <label for="yearInput" class="dial-label">Jump to Year</label>
          <input id="yearInput" class="year-input year-input--committed" type="text" inputmode="numeric" autocomplete="off" placeholder="2003–2025">
        </div>

        <!-- Future option: circular scrubber -->
        <!--
        <div class="dial-shell">
          <svg class="dial-svg" viewBox="0 0 120 72" aria-hidden="true">
            <path d="M10 62 A50 50 0 0 1 110 62" class="dial-track"></path>
            <path id="dialProgressPath" d="M10 62 A50 50 0 0 1 110 62" class="dial-progress"></path>
          </svg>
          <div class="dial-center-indicator"></div>
          <div class="dial-drag-surface" aria-label="Archive circular year scrubber"></div>
        </div>
        -->
      </section>
    </section>
  </main>

  <footer class="site-footer" id="footer">
    <div class="footer-inner">

      <div class="footer-forms">

        <div class="footer-form-group">
          <h3 class="footer-form-title">alumni sign-up</h3>
          <form class="footer-form" data-form="alumni">
            <label class="form-label">
              first name
              <input type="text" name="first_name" class="form-input" autocomplete="given-name">
            </label>
            <label class="form-label">
              last name
              <input type="text" name="last_name" class="form-input" autocomplete="family-name">
            </label>
            <label class="form-label">
              email
              <input type="email" name="email" class="form-input" autocomplete="email">
            </label>
          </form>
        </div>

        <div class="footer-form-group">
          <h3 class="footer-form-title">join the listserv</h3>
          <form class="footer-form" data-form="listserv">
            <label class="form-label">
              first name
              <input type="text" name="first_name" class="form-input" autocomplete="given-name">
            </label>
            <label class="form-label">
              last name
              <input type="text" name="last_name" class="form-input" autocomplete="family-name">
            </label>
            <label class="form-label">
              email
              <input type="email" name="email" class="form-input" autocomplete="email">
            </label>
          </form>
        </div>

      </div>

      <div class="footer-asset">
        <img src="assets/footer-asset.png" alt="" class="footer-asset-img">
      </div>

    </div>
  </footer>

  <script src="js/archive.js"></script>
</body>
</html>
